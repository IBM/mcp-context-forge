[workspace]
# This server is NOT part of the repository's root workspace

[package]
name = "slow-time-server"
version = "1.0.3"
edition = "2024"
rust-version = "1.85"
description = "Configurable-latency MCP test server for resilience testing"
license = "Apache-2.0"
authors = ["ContextForge Contributors"]
repository = "https://github.com/IBM/mcp-context-forge"

[dependencies]
anyhow = "1.0"
axum = "0.8.9"
chrono = { version = "0.4.45", features = ["serde"] }
chrono-tz = "0.10.4"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.49", features = ["full"] }
tower-http = { version = "0.6.11", features = ["cors"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }

[lints.clippy]
multiple_crate_versions = "allow"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
