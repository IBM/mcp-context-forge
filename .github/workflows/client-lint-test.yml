# ===============================================================
# ⚛️  Client Lint & Test - React Frontend Quality Gate
# ===============================================================
# Authors: Marek Dano
#   - runs ESLint, Prettier, and Vitest for the React client
#   - ensures code quality and test coverage for frontend
#   - runs on PRs and pushes to main
# ---------------------------------------------------------------

name: Client Lint & Test

on:
  push:
    branches: ["main", "epic/ui-rewrite"]
    paths:
      - "client/**"
      - ".github/workflows/client-lint-test.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main", "epic/ui-rewrite"]
    paths:
      - "client/**"
      - ".github/workflows/client-lint-test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Lint & Test Client
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # -----------------------------------------------------------
      # 0️⃣  Checkout
      # -----------------------------------------------------------
      - name: ⬇️  Checkout source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 1

      # -----------------------------------------------------------
      # 1️⃣  Setup runtimes
      # -----------------------------------------------------------
      - name: 🐍  Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.12"

      - name: 📦  Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: 🟩  Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      # -----------------------------------------------------------
      # 2️⃣  Python dependencies & OpenAPI export
      # -----------------------------------------------------------
      - name: 💾  Cache uv virtual environment
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .venv
          key: venv-${{ runner.os }}-python-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-python-3.12-
            venv-${{ runner.os }}-

      - name: 📥  Install Python dependencies
        run: |
          cp .env.example .env
          make venv
          make install-dev

      - name: 📄  Export OpenAPI spec
        run: |
          CACHE_TYPE=memory uv run python -c \
            "import json; from mcpgateway.main import app; open('client/openapi.json', 'w').write(json.dumps(app.openapi(), indent=2))"
          echo "OpenAPI spec exported ($(wc -c < client/openapi.json) bytes)"

      # -----------------------------------------------------------
      # 3️⃣  Install client dependencies & generate types
      # -----------------------------------------------------------
      - name: 📥  Install client dependencies
        working-directory: ./client
        run: npm ci --no-audit --no-fund

      - name: ⚙️  Generate types with orval
        working-directory: ./client
        run: npm run generate

      # -----------------------------------------------------------
      # 4️⃣  Run Prettier Check
      # -----------------------------------------------------------
      - name: 🎨  Check code formatting with Prettier
        working-directory: ./client
        run: npm run format:check

      # -----------------------------------------------------------
      # 5️⃣  Run ESLint
      # -----------------------------------------------------------
      - name: 🔍  Lint code with ESLint
        working-directory: ./client
        run: npm run lint

      # -----------------------------------------------------------
      # 6️⃣  Run Vitest
      # -----------------------------------------------------------
      - name: 🧪  Run tests with Vitest
        working-directory: ./client
        run: npm run test:coverage
