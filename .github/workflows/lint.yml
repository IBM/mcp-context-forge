# ===============================================================
# Lint & Static Analysis - Code Quality Gate
# ===============================================================
#
#   - Lints both mcpgateway/ and plugins/ in a unified workflow
#   - Python linters run per-target; repo-wide checks run once
#   - Each job installs the project in dev-editable mode
# ---------------------------------------------------------------

name: Lint & Static Analysis

on:
  push:
    branches: ["main"]
    paths:
      - "mcpgateway/**"
      - "plugins/**"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "mcpgateway/**"
      - "plugins/**"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Python linters - run on both mcpgateway/ and plugins/
  # ---------------------------------------------------------------
  python-lint:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    strategy:
      fail-fast: false
      matrix:
        target: [mcpgateway, plugins]
    name: "Python Linters (${{ matrix.target }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project and linters
        run: |
          python3 -m pip install --upgrade pip
          pip install -e .[dev]
          pip install flake8 ruff unimport vulture interrogate radon

      - name: Run flake8
        run: flake8 ${{ matrix.target }}

      - name: Run ruff
        run: ruff check ${{ matrix.target }}

      - name: Run unimport
        run: unimport ${{ matrix.target }}

      - name: Run vulture
        run: vulture ${{ matrix.target }} --min-confidence 80 --exclude "*_pb2.py,*_pb2_grpc.py"

      - name: Run pylint
        run: uv run pylint ${{ matrix.target }} --rcfile=.pylintrc.${{ matrix.target }} --fail-on E --fail-under=10

      - name: Run interrogate
        run: interrogate -vv ${{ matrix.target }} --fail-under 100

      - name: Run radon
        run: radon cc ${{ matrix.target }} --min C --show-complexity && radon mi ${{ matrix.target }} --min B

  # ---------------------------------------------------------------
  # Repo-wide syntax/format checkers (run once, not per-target)
  # ---------------------------------------------------------------
  syntax-check:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Syntax Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install syntax checkers
        run: |
          pip install yamllint tomlcheck
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Run yamllint
        run: yamllint -c .yamllint .

      - name: Run jsonlint
        run: |
          find . -type f -name '*.json' -not -path './node_modules/*' -print0 |
            xargs -0 -I{} jq empty "{}"

      - name: Run tomllint
        run: |
          find . -type f -name '*.toml' \
            -not -path './plugin_templates/*' \
            -not -path './mcp-servers/templates/*' \
            -print0 |
            xargs -0 -I{} tomlcheck "{}"
