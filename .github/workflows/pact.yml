# ===============================================================
# 📜  Pact Contract Testing
# ===============================================================
#
#   - Runs consumer contract tests (Gateway → MCP servers)
#   - Generates pact files from consumer expectations
#   - Runs provider verification (clients → Gateway APIs)
#   - Verifies Gateway APIs against consumer contracts
#   - Optionally publishes results to a Pact Broker
# ---------------------------------------------------------------

name: Pact Contract Tests

on:
  push:
    branches: ["main"]
    paths:
      - "mcpgateway/**"
      - "tests/pact/**"
      - "pyproject.toml"
      - ".github/workflows/pact.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "mcpgateway/**"
      - "tests/pact/**"
      - "pyproject.toml"
      - ".github/workflows/pact.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pact-consumer:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Consumer contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.2"
          python-version: "3.12"

      - name: Install Rust stable
        run: rustup default stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            plugins_rust/*/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust plugins
        run: make rust-clean-stubs && make rust-install && make rust-verify-stubs

      - name: Run consumer contract tests
        run: |
          mkdir -p pacts
          uv run pytest tests/pact/consumer/ -v -m pact --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          TEST_DATABASE_URL: "sqlite:///:memory:"

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: pacts/
          retention-days: 7

  pact-provider:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Provider verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: pact-consumer

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.2"
          python-version: "3.12"

      - name: Install Rust stable
        run: rustup default stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            plugins_rust/*/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust plugins
        run: make rust-clean-stubs && make rust-install && make rust-verify-stubs

      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: pacts/

      - name: Run provider verification
        run: |
          uv run pytest tests/pact/provider/ -v -m pact --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          TEST_DATABASE_URL: "sqlite:///:memory:"
