# ===============================================================
# Docker Security Scan Workflow
# ===============================================================
#
# This workflow performs security scanning on container images:
#   1. Build image locally (no push required)
#   2. Generate SBOM with Syft
#   3. Scan for vulnerabilities with Grype
#   4. Upload SBOM and SARIF reports
#
# Runs on both PRs and pushes to catch issues early.
#
# ===============================================================

name: Docker Security Scan

on:
  push:
    branches: ["main"]
    paths:
      - 'Containerfile.lite'
      - 'mcpgateway/**'
      - 'plugins/**'
      - 'pyproject.toml'
      - '.github/workflows/docker-scan.yml'
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - 'Containerfile.lite'
      - 'mcpgateway/**'
      - 'plugins/**'
      - 'pyproject.toml'
      - '.github/workflows/docker-scan.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: mcp-context-forge-scan

jobs:
  # ---------------------------------------------------------------
  # Build and scan image
  # ---------------------------------------------------------------
  scan:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image locally
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Containerfile.lite
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha,scope=scan-build-amd64
          cache-to: type=gha,mode=max,scope=scan-build-amd64

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE_NAME }}:scan
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30

      - name: Grype vulnerability scan
        id: grype
        continue-on-error: true
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: ${{ env.IMAGE_NAME }}:scan
          fail-build: false
          only-fixed: true
          severity-cutoff: high
          output-format: sarif
          output-file: grype-results.sarif
          cache-db: false

      - name: Upload Grype SARIF
        if: always() && hashFiles('grype-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@256d634097be96e792d6764f9edaefc4320557b1 # v4
        with:
          sarif_file: grype-results.sarif
          category: grype
