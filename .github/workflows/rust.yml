# Unified Rust CI: workspace (crates/*), maturin plugins, and tools. Uses Makefile rust-* targets.
# Runs on ubuntu and macos only; Makefile requires a Unix shell (Windows not supported).
name: Rust CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main, develop]
    paths:
      - "a2a-agents/rust/**"
      - "crates/**"
      - "mcp-servers/rust/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "Makefile"
      - "mcpgateway/db.py"
      - "mcpgateway/alembic/**"
      - "supply-chain/**"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  ci-decision:
    name: Full CI decision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run-full-ci: ${{ steps.decision.outputs.run-full-ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Decide full CI scope
        id: decision
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: rust.yml
          EVENT_NAME: ${{ github.event_name }}
          EVENT_JSON: ${{ toJson(github.event) }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_REF_TYPE_VALUE: ${{ github.ref_type }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: python3 .github/scripts/secret_baseline_ci_decision.py

  rust-build:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Rust build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python (for uv / maturin)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.30"

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup default stable

      - name: Check Cargo.lock is current
        run: cargo metadata --locked --format-version 1 >/dev/null

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo build (workspace)
        run: make rust-build-check

      - name: Generate Python stubs (maturin crates)
        run: make rust-stub-gen
      - name: Verify Python stubs
        run: make rust-verify-stubs

  rust-fmt:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Rust fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup component add rustfmt
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo fmt (check)
        run: make rust-fmt-check

  rust-clippy:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Rust clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup component add clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo clippy (workspace)
        run: make rust-lint

  rust-unused-deps:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Rust unused dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-unused-deps-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-unused-deps-

      - name: Cargo shear
        run: make rust-unused-deps

  rust-test:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo test (workspace)
        run: make rust-test

  rust-test-redis:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Rust test (Redis-backed paths)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AUTH_ENCRYPTION_SECRET: ci-rust-auth-encryption-secret-1234567890 # pragma: allowlist secret
      REDIS_URL: redis://127.0.0.1:6379/0
      MCP_RUST_REDIS_URL: redis://127.0.0.1:6379/0
    services:
      redis:
        image: redis:7-bookworm
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-redis-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo test (Redis-backed runtime paths)
        run: cargo test -p contextforge_mcp_runtime --test runtime

  build-wheels:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install Rust
        run: rustup default stable

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.30"

      - name: Install maturin
        run: uv tool install maturin==1.12.6

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wheels-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Build wheels (maturin crates)
        run: make rust-build-wheels

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-${{ matrix.os }}
          path: crates/**/target/wheels/*.whl

  security-audit:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Run rust-deny
        run: make rust-deny

  supply-chain-vet:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Supply-chain vet
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Install cargo-vet
        run: cargo install --locked cargo-vet --version 0.10.2

      - name: Run rust-vet
        run: make rust-vet

  license-check:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: License check (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Run rust-licenses (workspace)
        run: make rust-licenses

  benchmark-build-check:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Benchmarks (build check only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Verify benchmarks build (no run)
        run: make rust-bench-check

  coverage:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install Rust and llvm-tools
        run: |
          rustup default stable
          rustup component add llvm-tools-preview

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.30"

      - name: Install coverage tools
        run: |
          uv tool install maturin==1.12.6
          cargo install --locked cargo-llvm-cov --version 0.8.5

      - name: Run rust-coverage
        run: make rust-coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rust-coverage
          path: coverage/cobertura.xml

  documentation:
    needs: ci-decision
    if: always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) && (needs.ci-decision.result != 'success' || needs.ci-decision.outputs.run-full-ci != 'false')
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Build rust-doc
        run: make rust-doc

      - name: Upload docs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rust-docs
          path: target/doc
