# Unified Rust CI: workspace (crates/*), maturin plugins, and tools. Uses Makefile rust-* targets.
# Runs on ubuntu and macos only; Makefile requires a Unix shell (Windows not supported).
name: Rust CI

on:
  push:
    branches: [main, develop]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "Makefile"
      - ".github/workflows/rust.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main, develop]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "Makefile"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-build:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Rust build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for uv / maturin)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.2"

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo build (workspace)
        run: make rust-build-check

      - name: Generate Python stubs (maturin crates)
        run: make rust-stub-gen
      - name: Verify Python stubs
        run: make rust-verify-stubs

  rust-fmt:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Rust fmt (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup component add rustfmt
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo fmt (check)
        run: make rust-fmt-check

  rust-clippy:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Rust clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable
          rustup component add clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo clippy (workspace)
        run: make rust-lint

  rust-test:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Cargo test (workspace)
        run: make rust-test

  build-wheels:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        run: rustup default stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.2"

      - name: Install maturin
        run: uv tool install maturin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wheels-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Build wheels (maturin crates)
        run: make rust-build-wheels

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: crates/**/target/wheels/*.whl

  security-audit:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run rust-audit
        run: make rust-audit

  license-check:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: License check (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Run rust-licenses (workspace)
        run: make rust-licenses

  benchmark-build-check:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Benchmarks (build check only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Verify benchmarks build (no run)
        run: make rust-bench-check

  coverage:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust and llvm-tools
        run: |
          rustup default stable
          rustup component add llvm-tools-preview

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.2"

      - name: Install coverage tools
        run: |
          uv tool install maturin
          cargo install cargo-llvm-cov

      - name: Run rust-coverage
        run: make rust-coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          flags: rust
          name: rust-coverage

  documentation:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}

      - name: Build rust-doc
        run: make rust-doc

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: rust-docs
          path: target/doc

  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust-build, rust-fmt, rust-clippy, rust-test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust
        run: rustup default stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.2"

      - name: Install maturin
        run: uv tool install maturin

      - name: Build release wheels
        run: make rust-release

      - name: Publish to PyPI (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: make rust-release-publish

      - name: Upload release wheels
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels-${{ matrix.os }}
          path: crates/**/target/wheels/*.whl
