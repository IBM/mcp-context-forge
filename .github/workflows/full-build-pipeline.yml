# ===============================================================
# 🏗️  Full Build Pipeline - Integration Verification
# ===============================================================
#
# This workflow validates the integrated build pipeline:
#   1. Environment setup (venv, dependencies)
#   2. Code formatting verification (autoflake, isort, black)
#   3. SRI hash verification
#   4. End-to-end smoke tests
#
# Linting, tests, security scans, and Docker builds are handled
# by dedicated workflows (lint.yml, pytest.yml, bandit.yml, etc.)
# ---------------------------------------------------------------

name: Full Build Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "mcpgateway/**"
      - "plugins/**"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/full-build-pipeline.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "mcpgateway/**"
      - "plugins/**"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/full-build-pipeline.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  full-pipeline:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Complete Build Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.2"
          python-version: "3.12"

      - name: Environment setup
        run: make venv install install-dev

      - name: Code formatting verification
        run: make autoflake isort black

      - name: Verify SRI hashes
        run: make sri-verify

      - name: End-to-end smoke tests
        run: make smoketest
