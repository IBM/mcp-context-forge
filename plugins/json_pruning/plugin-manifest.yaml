description: "Prune JSON tool responses to reduce LLM token consumption"
author: "Matt Van Horn"
version: "0.1.0"
available_hooks:
  - "tool_post_invoke"
default_configs:
  strip_fields:
    - "_links"
    - "_metadata"
    - "debug"
    - "pagination"
    - "__typename"
  max_array_items: 50
  max_string_length: 5000
  max_depth: 10
  array_truncation_notice: "[... {remaining} more items truncated]"
  string_truncation_suffix: "..."
  depth_placeholder: "{...}"
