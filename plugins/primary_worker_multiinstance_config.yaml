# plugins/primary_worker_multiinstance_config.yaml
# Plugin config for the multi-instance primary-worker e2e. Point the gateway at
# this file via PLUGINS_CONFIG_FILE. Loads only the Redis marker plugin.

plugin_settings:
  plugin_timeout: 120
  fail_on_plugin_error: false

plugins:
  - name: "MultiInstanceMarker"
    kind: "plugins.primary_worker_multiinstance.marker.MultiInstanceMarkerPlugin"
    description: "E2E: non-hook plugin that records the primary process in a shared Redis list"
    version: "0.0.1"
    author: "tests"
    hooks: []
    tags: ["test", "e2e"]
    mode: "permissive"
    priority: 50
    conditions: []
    config: {}
