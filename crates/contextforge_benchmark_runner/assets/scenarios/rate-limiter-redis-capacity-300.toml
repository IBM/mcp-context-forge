[suite]
name = "benchmark-rate-limiter-redis-capacity-compare"
description = "Covers the rate limiter Redis capacity Locust family with a prompt-heavy plugins-enabled benchmark workload."
output_root = "reports/benchmarks"
continue_on_failure = false
save_intermediate_artifacts = true
flamegraph_enabled = false

[defaults.setup]
target_kind = "gateway"
auth_mode = "jwt"
plugins_enabled = true

[defaults.build]
rust_plugins = false
profiling_image = false
container_file = "crates/contextforge_benchmark_runner/assets/Containerfile"
image_name = "mcpgateway/mcpgateway"
image_tag = "benchmark-suite-rate-limiter-redis-capacity"
rebuild_policy = "missing"

[defaults.runtime]
http_server = "gunicorn"
host = "127.0.0.1"
transport_type = "streamablehttp"

[defaults.runtime.gunicorn]
workers = 12
timeout = 30
graceful_timeout = 30
keep_alive = 10
max_requests = 0
max_requests_jitter = 0
backlog = 16384
preload_app = true
dev_mode = false

[defaults.gateway]
disable_access_log = true
templates_auto_reload = false
structured_logging_database_enabled = false
sqlalchemy_echo = false
log_level = "ERROR"

[defaults.load]
driver = "contextforge_goose"
headless = true
only_summary = true
html_report = false
users = 100
spawn_rate = 10
run_time = "120s"
target_service = "nginx"

[defaults.load.env]
BENCH_MCP_SESSION_MODE = "reuse"

[defaults.load.workload]
fallback_endpoint = "/mcp prompts/get fast-time-schedule-meeting"

[defaults.load.workload.endpoints."/mcp prompts/get fast-time-schedule-meeting"]
enabled = true
weight = 10

[defaults.load.workload.endpoints."/mcp prompts/get fast-time-compare-timezones"]
enabled = true
weight = 6

[defaults.measurement]
warmup_seconds = 15
measure_seconds = 90
profile_seconds = 0
cooldown_seconds = 15

[defaults.profiling]
enabled = false
tools = ["perf", "flamegraph"]
duration_seconds = 0
required = false

[defaults.execution]
retry_enabled = true
max_attempts = 2
capture_logs = true
save_raw_results = true
reuse_stack = true

[[scenario]]
name = "gunicorn-rate-limiter-redis-capacity-baseline"
description = "Prompt-heavy Redis-backed rate limiter baseline."
scenario_type = "rate_limiter_redis_capacity_baseline"

[scenario.build]
image_tag = "benchmark-suite-rate-limiter-redis-capacity-baseline"

[[scenario]]
name = "gunicorn-rate-limiter-redis-capacity-rust-plugins"
description = "Prompt-heavy Redis-backed rate limiter workload with Rust plugin artifacts installed."
scenario_type = "rate_limiter_redis_capacity_rust_plugins_compare"

[scenario.build]
rust_plugins = true
image_tag = "benchmark-suite-rate-limiter-redis-capacity-rust-plugins"
