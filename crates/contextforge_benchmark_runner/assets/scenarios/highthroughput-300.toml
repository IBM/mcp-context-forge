[suite]
name = "benchmark-highthroughput-compare"
description = "Covers the high-throughput Locust family with a read-heavy control-plane workload focused on cheap gateway endpoints."
output_root = "reports/benchmarks"
continue_on_failure = false
save_intermediate_artifacts = true
flamegraph_enabled = false

[defaults.setup]
target_kind = "gateway"
auth_mode = "jwt"
plugins_enabled = false

[defaults.build]
rust_plugins = false
profiling_image = false
container_file = "crates/contextforge_benchmark_runner/assets/Containerfile"
image_name = "mcpgateway/mcpgateway"
image_tag = "benchmark-suite-highthroughput"
rebuild_policy = "missing"

[defaults.runtime]
http_server = "gunicorn"
host = "127.0.0.1"
transport_type = "streamablehttp"

[defaults.runtime.gunicorn]
workers = 12
timeout = 30
graceful_timeout = 30
keep_alive = 10
max_requests = 0
max_requests_jitter = 0
backlog = 16384
preload_app = true
dev_mode = false

[defaults.gateway]
disable_access_log = true
templates_auto_reload = false
structured_logging_database_enabled = false
sqlalchemy_echo = false
log_level = "ERROR"

[defaults.load]
driver = "contextforge_goose"
headless = true
only_summary = true
html_report = false
users = 300
spawn_rate = 60
run_time = "180s"
target_service = "nginx"

[defaults.load.workload]
fallback_endpoint = "/health"

[defaults.load.workload.endpoints."/health"]
enabled = true
weight = 20

[defaults.load.workload.endpoints."/servers"]
enabled = true
weight = 12

[defaults.load.workload.endpoints."/resources"]
enabled = true
weight = 10

[defaults.load.workload.endpoints."/prompts"]
enabled = true
weight = 10

[defaults.load.workload.endpoints."/ready"]
enabled = true
weight = 8

[defaults.measurement]
warmup_seconds = 30
measure_seconds = 120
profile_seconds = 0
cooldown_seconds = 30

[defaults.profiling]
enabled = false
tools = ["perf", "flamegraph"]
duration_seconds = 0
required = false

[defaults.execution]
retry_enabled = true
max_attempts = 2
capture_logs = true
save_raw_results = true
reuse_stack = true

[[scenario]]
name = "gunicorn-highthroughput-baseline"
description = "Read-heavy high-throughput control-plane baseline."
scenario_type = "highthroughput_baseline"

[scenario.build]
image_tag = "benchmark-suite-highthroughput-baseline"

[[scenario]]
name = "gunicorn-highthroughput-rust-runtime"
description = "Read-heavy high-throughput control-plane workload with Rust MCP runtime enabled in the same gateway."
scenario_type = "highthroughput_rust_runtime_compare"

[scenario.setup]
expected_mcp_runtime = "rust"
expected_mcp_runtime_mode = "rust-managed"

[scenario.build]
rust_plugins = true
image_tag = "benchmark-suite-highthroughput-rust-runtime"

[scenario.gateway.environment]
EXPERIMENTAL_RUST_MCP_RUNTIME_ENABLED = "true"
RUST_MCP_MODE = "edge"
RUST_MCP_LOG = "warn"
