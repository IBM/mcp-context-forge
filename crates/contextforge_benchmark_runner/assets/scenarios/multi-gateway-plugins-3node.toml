[suite]
name = "benchmark-multi-gateway-plugins-3node"
description = "Cold-start validation for ingress-balanced three-gateway benchmarks with plugins, PostgreSQL, Redis, and PgBouncer enabled."
output_root = "reports/benchmarks"
continue_on_failure = false
save_intermediate_artifacts = true
flamegraph_enabled = false

[defaults.setup]
target_kind = "gateway"
auth_mode = "jwt"
plugins_enabled = true

[defaults.build]
rust_plugins = false
profiling_image = false
container_file = "crates/contextforge_benchmark_runner/assets/Containerfile"
image_name = "mcpgateway/mcpgateway"
image_tag = "benchmark-suite-multi-gateway-plugins-3node"
rebuild_policy = "missing"

[defaults.runtime]
http_server = "gunicorn"
host = "127.0.0.1"
transport_type = "streamablehttp"

[defaults.runtime.gunicorn]
workers = 4
timeout = 30
graceful_timeout = 30
keep_alive = 10
max_requests = 0
max_requests_jitter = 0
backlog = 16384
preload_app = true
dev_mode = false

[defaults.topology]
mode = "multi_gateway"
gateway_count = 3
ingress_enabled = true
ingress_service = "nginx"
shared_services = ["postgres", "redis", "pgbouncer"]
gateway_base_service = "gateway"
gateway_name_prefix = "gateway"

[defaults.gateway]
disable_access_log = true
templates_auto_reload = false
structured_logging_database_enabled = false
sqlalchemy_echo = false
log_level = "ERROR"

[defaults.load]
driver = "contextforge_goose"
headless = true
only_summary = true
html_report = false
users = 60
spawn_rate = 12
run_time = "60s"
request_count = 900
target_service = "nginx"

[defaults.load.env]
BENCH_MCP_SESSION_MODE = "reuse"

[defaults.load.workload]
fallback_endpoint = "/admin/plugins"

[defaults.load.workload.endpoints."/health"]
enabled = false

[defaults.load.workload.endpoints."/admin/plugins"]
enabled = true
weight = 5

[defaults.load.workload.endpoints."/servers"]
enabled = true
weight = 2

[defaults.measurement]
warmup_seconds = 5
measure_seconds = 45
profile_seconds = 0
cooldown_seconds = 5

[defaults.profiling]
enabled = false
tools = ["perf", "flamegraph"]
duration_seconds = 0
required = false

[defaults.execution]
retry_enabled = true
max_attempts = 2
capture_logs = true
save_raw_results = true
reuse_stack = true

[[scenario]]
name = "gunicorn-multi-gateway-plugins-3node"
description = "Plugin-enabled full benchmark through nginx across three shared gateway nodes."
scenario_type = "multi_gateway_plugins_3node"

[[scenario.topology.gateway_override]]
index = 2

[scenario.topology.gateway_override.environment]
LOG_LEVEL = "WARNING"

[[scenario.topology.gateway_override]]
index = 3

[scenario.topology.gateway_override.environment]
LOG_LEVEL = "WARNING"
