[suite]
name = "benchmark-rate-limiter-scale-compare"
description = "Covers the rate limiter scale Locust family with a high-user plugins-enabled MCP tools/call workload."
output_root = "reports/benchmarks"
continue_on_failure = false
save_intermediate_artifacts = true
flamegraph_enabled = false

[defaults.setup]
target_kind = "gateway"
auth_mode = "jwt"
plugins_enabled = true

[defaults.build]
rust_plugins = false
profiling_image = false
container_file = "crates/contextforge_benchmark_runner/assets/Containerfile"
image_name = "mcpgateway/mcpgateway"
image_tag = "benchmark-suite-rate-limiter-scale"
rebuild_policy = "missing"

[defaults.runtime]
http_server = "gunicorn"
host = "127.0.0.1"
transport_type = "streamablehttp"

[defaults.runtime.gunicorn]
workers = 12
timeout = 30
graceful_timeout = 30
keep_alive = 10
max_requests = 0
max_requests_jitter = 0
backlog = 16384
preload_app = true
dev_mode = false

[defaults.gateway]
disable_access_log = true
templates_auto_reload = false
structured_logging_database_enabled = false
sqlalchemy_echo = false
log_level = "ERROR"

[defaults.load]
driver = "contextforge_goose"
headless = true
only_summary = true
html_report = false
users = 500
spawn_rate = 20
run_time = "300s"
target_service = "nginx"

[defaults.load.env]
BENCH_MCP_SESSION_MODE = "reuse"

[defaults.load.workload]
fallback_endpoint = "/mcp tools/call fast-time-get-system-time"

[defaults.load.workload.endpoints."/mcp tools/list"]
enabled = true
weight = 1

[defaults.load.workload.endpoints."/mcp tools/call fast-time-get-system-time"]
enabled = true
weight = 15

[defaults.measurement]
warmup_seconds = 30
measure_seconds = 240
profile_seconds = 0
cooldown_seconds = 30

[defaults.profiling]
enabled = false
tools = ["perf", "flamegraph"]
duration_seconds = 0
required = false

[defaults.execution]
retry_enabled = true
max_attempts = 2
capture_logs = true
save_raw_results = true
reuse_stack = true

[[scenario]]
name = "gunicorn-rate-limiter-scale-baseline"
description = "High-cardinality rate limiter workload without Rust plugin artifacts."
scenario_type = "rate_limiter_scale_baseline"

[scenario.build]
image_tag = "benchmark-suite-rate-limiter-scale-baseline"

[[scenario]]
name = "gunicorn-rate-limiter-scale-rust-plugins"
description = "High-cardinality rate limiter workload with Rust plugin artifacts installed."
scenario_type = "rate_limiter_scale_rust_plugins_compare"

[scenario.build]
rust_plugins = true
image_tag = "benchmark-suite-rate-limiter-scale-rust-plugins"
