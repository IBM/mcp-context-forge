plugin_dirs:
  - "plugins/native"
  - "plugins/custom"
  - "/etc/mcpgateway/plugins"

plugin_settings:
  parallel_execution_within_band: true
  plugin_timeout: 120
  fail_on_plugin_error: true  # CRITICAL: Fail tests when plugin errors occur
  enable_plugin_api: true
  plugin_health_check_interval: 120
  include_user_info: false

plugins:
  - name: "pii_filter"
    kind: "cpex_pii_filter.pii_filter.PIIFilterPlugin"
    description: "Detects and masks Personally Identifiable Information for plugin E2E validation"
    version: "0.2.0"
    author: "ContextForge"
    hooks: ["prompt_pre_fetch", "prompt_post_fetch", "tool_pre_invoke", "tool_post_invoke"]
    tags: ["security", "pii", "compliance", "e2e", "test"]
    mode: "enforce"  # CRITICAL: Raise errors on plugin failures to catch issues early. Change to "permissive" if graceful error handling is needed.
    priority: 50
    conditions:
      - prompts: []
        server_ids: []
        tenant_ids: []
    config:
      detect_ssn: true
      detect_credit_card: true
      detect_email: true
      detect_phone: true
      detect_ip_address: false
      default_mask_strategy: "partial"
      redaction_text: "[PII_REDACTED]"
      block_on_detection: false
      log_detections: true
      include_detection_details: true
      whitelist_patterns:
        - "test@example.com"
        - "555-555-5555"
