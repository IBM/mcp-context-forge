[project]
name = "test-reverse-proxy-mcp-server"
version = "0.1.0"
description = "Test MCP server for reverse proxy multi-transport (stdio, HTTP, SSE)"
authors = [
    {name = "ContextForge Team"}
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=0.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/test_reverse_proxy_mcp_server"]