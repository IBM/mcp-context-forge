[suite]
name = "benchmark-gunicorn-baseline-compare"
description = "Covers the baseline Locust family with a mixed fast-time and gateway benchmark workload across health, REST discovery, and core MCP calls."
output_root = "reports/benchmarks"
continue_on_failure = false
save_intermediate_artifacts = true
flamegraph_enabled = false

[defaults.setup]
target_kind = "gateway"
auth_mode = "jwt"
plugins_enabled = false

[defaults.build]
rust_plugins = false
profiling_image = false
container_file = "tools_rust/contextforge_benchmark/assets/Containerfile"
image_name = "mcpgateway/mcpgateway"
image_tag = "benchmark-suite-baseline"
rebuild_policy = "missing"

[defaults.runtime]
http_server = "gunicorn"
host = "127.0.0.1"
transport_type = "streamablehttp"

[defaults.runtime.gunicorn]
workers = 12
timeout = 30
graceful_timeout = 30
keep_alive = 10
max_requests = 0
max_requests_jitter = 0
backlog = 16384
preload_app = true
dev_mode = false

[defaults.gateway]
disable_access_log = true
templates_auto_reload = false
structured_logging_database_enabled = false
sqlalchemy_echo = false
log_level = "ERROR"

[defaults.load]
driver = "contextforge_goose"
headless = true
only_summary = true
html_report = false
users = 300
spawn_rate = 60
run_time = "180s"
target_service = "nginx"

[defaults.load.env]
BENCH_MCP_SESSION_MODE = "reuse"

[defaults.load.workload]
fallback_endpoint = "/health"

[defaults.load.workload.endpoints."/health"]
enabled = true
weight = 6

[defaults.load.workload.endpoints."/servers"]
enabled = true
weight = 4

[defaults.load.workload.endpoints."/resources"]
enabled = true
weight = 3

[defaults.load.workload.endpoints."/prompts"]
enabled = true
weight = 3

[defaults.load.workload.endpoints."/mcp tools/list"]
enabled = true
weight = 4

[defaults.load.workload.endpoints."/mcp tools/call fast-time-get-system-time"]
enabled = true
weight = 8

[defaults.load.workload.endpoints."/mcp resources/list"]
enabled = true
weight = 3

[defaults.measurement]
warmup_seconds = 30
measure_seconds = 120
profile_seconds = 0
cooldown_seconds = 30

[defaults.profiling]
enabled = false
tools = ["perf", "flamegraph"]
duration_seconds = 0
required = false

[defaults.execution]
retry_enabled = true
max_attempts = 2
capture_logs = true
save_raw_results = true
reuse_stack = true

[[scenario]]
name = "gunicorn-baseline-workload"
description = "Baseline benchmark workload on the default gateway path."
scenario_type = "baseline_workload"

[scenario.build]
rust_plugins = false
image_tag = "benchmark-suite-baseline-default"

[[scenario]]
name = "gunicorn-baseline-rust-runtime"
description = "Baseline workload with the Rust MCP runtime enabled behind the shared gateway."
scenario_type = "baseline_rust_runtime_compare"

[scenario.setup]
expected_mcp_runtime = "rust"
expected_mcp_runtime_mode = "rust-managed"

[scenario.build]
rust_plugins = true
image_tag = "benchmark-suite-baseline-rust-runtime"

[scenario.gateway.environment]
EXPERIMENTAL_RUST_MCP_RUNTIME_ENABLED = "true"
RUST_MCP_MODE = "edge"
RUST_MCP_LOG = "warn"
