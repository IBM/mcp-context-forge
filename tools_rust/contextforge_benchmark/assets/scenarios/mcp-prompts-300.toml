[suite]
name = "benchmark-gunicorn-mcp-prompts-compare"
description = "Exercises MCP prompt discovery and prompt fetch requests over the shared benchmark stack, then compares the baseline benchmark image against the rust-plugin benchmark image to show whether prompt-heavy MCP traffic regresses or improves."
output_root = "reports/benchmarks"
continue_on_failure = false
save_intermediate_artifacts = true
flamegraph_enabled = false

[defaults.setup]
target_kind = "gateway"
auth_mode = "jwt"
plugins_enabled = false

[defaults.build]
rust_plugins = false
profiling_image = false
container_file = "tools_rust/contextforge_benchmark/assets/Containerfile"
image_name = "mcpgateway/mcpgateway"
image_tag = "benchmark-suite-mcp-prompts"
rebuild_policy = "missing"

[defaults.runtime]
http_server = "gunicorn"
host = "127.0.0.1"
transport_type = "streamablehttp"

[defaults.runtime.gunicorn]
workers = 12
timeout = 30
graceful_timeout = 30
keep_alive = 10
max_requests = 0
max_requests_jitter = 0
backlog = 16384
preload_app = true
dev_mode = false

[defaults.gateway]
disable_access_log = true
templates_auto_reload = false
structured_logging_database_enabled = false
sqlalchemy_echo = false
log_level = "ERROR"

[defaults.load]
driver = "contextforge_goose"
headless = true
only_summary = true
html_report = false
users = 300
spawn_rate = 60
run_time = "180s"
target_service = "nginx"

[defaults.load.env]
BENCH_MCP_SESSION_MODE = "reuse"

[defaults.load.workload]
fallback_endpoint = "/mcp prompts/list"

[defaults.load.workload.endpoints."/health"]
enabled = false

[defaults.load.workload.endpoints."/ready"]
enabled = false

[defaults.load.workload.endpoints."/admin/plugins"]
enabled = false

[defaults.load.workload.endpoints."/servers"]
enabled = false

[defaults.load.workload.endpoints."/resources"]
enabled = false

[defaults.load.workload.endpoints."/prompts"]
enabled = false

[defaults.load.workload.endpoints."/mcp tools/list"]
enabled = false

[defaults.load.workload.endpoints."/mcp resources/list"]
enabled = false

[defaults.load.workload.endpoints."/mcp prompts/list"]
enabled = true
weight = 7

[defaults.load.workload.endpoints."/mcp prompts/get fast-time-schedule-meeting"]
enabled = true
weight = 10

[defaults.load.workload.endpoints."/mcp prompts/get fast-time-compare-timezones"]
enabled = true
weight = 8

[defaults.measurement]
warmup_seconds = 30
measure_seconds = 120
profile_seconds = 0
cooldown_seconds = 30

[defaults.profiling]
enabled = false
tools = ["perf", "flamegraph"]
duration_seconds = 0
required = false

[defaults.execution]
retry_enabled = true
max_attempts = 2
capture_logs = true
save_raw_results = true
reuse_stack = true

[[scenario]]
name = "gunicorn-mcp-prompts-baseline"
description = "MCP prompts benchmark on the baseline benchmark image"
scenario_type = "mcp_prompts_baseline"

[scenario.build]
rust_plugins = false
image_tag = "benchmark-suite-mcp-prompts-baseline"

[[scenario]]
name = "gunicorn-mcp-prompts-rust-plugins"
description = "MCP prompts benchmark on the rust-plugin benchmark image"
scenario_type = "mcp_prompts_rust_plugins_compare"

[scenario.build]
rust_plugins = true
image_tag = "benchmark-suite-mcp-prompts-rust"
