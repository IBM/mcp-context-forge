[suite]
name = "benchmark-gunicorn-mcp-resources-compare"
description = "Exercises MCP resource listing and resource read traffic against the time-service fixtures, then compares the default Python MCP path against a Rust-managed MCP runtime variant to show whether resource-heavy MCP traffic improves or regresses when the Rust runtime owns /mcp."
output_root = "reports/benchmarks"
continue_on_failure = false
save_intermediate_artifacts = true
flamegraph_enabled = false

[defaults.setup]
target_kind = "gateway"
auth_mode = "jwt"
plugins_enabled = false

[defaults.build]
rust_plugins = false
profiling_image = false
container_file = "tools_rust/contextforge_benchmark/assets/Containerfile"
image_name = "mcpgateway/mcpgateway"
image_tag = "benchmark-suite-mcp-resources"
rebuild_policy = "missing"

[defaults.runtime]
http_server = "gunicorn"
host = "127.0.0.1"
transport_type = "streamablehttp"

[defaults.runtime.gunicorn]
workers = 12
timeout = 30
graceful_timeout = 30
keep_alive = 10
max_requests = 0
max_requests_jitter = 0
backlog = 16384
preload_app = true
dev_mode = false

[defaults.gateway]
disable_access_log = true
templates_auto_reload = false
structured_logging_database_enabled = false
sqlalchemy_echo = false
log_level = "ERROR"

[defaults.load]
driver = "contextforge_goose"
headless = true
only_summary = true
html_report = false
users = 300
spawn_rate = 60
run_time = "180s"
target_service = "nginx"

[defaults.load.env]
BENCH_MCP_SESSION_MODE = "reuse"

[defaults.load.workload]
fallback_endpoint = "/mcp resources/list"

[defaults.load.workload.endpoints."/health"]
enabled = false

[defaults.load.workload.endpoints."/ready"]
enabled = false

[defaults.load.workload.endpoints."/admin/plugins"]
enabled = false

[defaults.load.workload.endpoints."/servers"]
enabled = false

[defaults.load.workload.endpoints."/resources"]
enabled = false

[defaults.load.workload.endpoints."/prompts"]
enabled = false

[defaults.load.workload.endpoints."/mcp tools/list"]
enabled = false

[defaults.load.workload.endpoints."/mcp resources/list"]
enabled = true
weight = 7

[defaults.load.workload.endpoints."/mcp resources/read timezone://info"]
enabled = true
weight = 10

[defaults.load.workload.endpoints."/mcp resources/read time://current/world"]
enabled = true
weight = 8

[defaults.load.workload.endpoints."/mcp prompts/list"]
enabled = false

[defaults.measurement]
warmup_seconds = 30
measure_seconds = 120
profile_seconds = 0
cooldown_seconds = 30

[defaults.profiling]
enabled = false
tools = ["perf", "flamegraph"]
duration_seconds = 0
required = false

[defaults.execution]
retry_enabled = true
max_attempts = 2
capture_logs = true
save_raw_results = true
reuse_stack = true

[[scenario]]
name = "gunicorn-mcp-resources-baseline"
description = "MCP resources benchmark on the default Python-managed /mcp path"
scenario_type = "mcp_resources_baseline"

[scenario.build]
rust_plugins = false
image_tag = "benchmark-suite-mcp-resources-baseline"

[[scenario]]
name = "gunicorn-mcp-resources-rust-runtime"
description = "MCP resources benchmark with the Rust-managed /mcp runtime enabled for the same resource-heavy workload"
scenario_type = "mcp_resources_rust_runtime_compare"

[scenario.setup]
expected_mcp_runtime = "rust"
expected_mcp_runtime_mode = "rust-managed"

[scenario.build]
rust_plugins = true
image_tag = "benchmark-suite-mcp-resources-rust-runtime"

[scenario.gateway.environment]
EXPERIMENTAL_RUST_MCP_RUNTIME_ENABLED = "true"
RUST_MCP_MODE = "edge"
RUST_MCP_LOG = "warn"
