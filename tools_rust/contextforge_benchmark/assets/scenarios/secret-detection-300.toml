[suite]
name = "benchmark-secret-detection-compare"
description = "Covers the secret detection Locust family with a prompt-heavy plugins-enabled workload that exercises prompt retrieval under secret scanning."
output_root = "reports/benchmarks"
continue_on_failure = false
save_intermediate_artifacts = true
flamegraph_enabled = false

[defaults.setup]
target_kind = "gateway"
auth_mode = "jwt"
plugins_enabled = true

[defaults.build]
rust_plugins = false
profiling_image = false
container_file = "tools_rust/contextforge_benchmark/assets/Containerfile"
image_name = "mcpgateway/mcpgateway"
image_tag = "benchmark-suite-secret-detection"
rebuild_policy = "missing"

[defaults.runtime]
http_server = "gunicorn"
host = "127.0.0.1"
transport_type = "streamablehttp"

[defaults.runtime.gunicorn]
workers = 12
timeout = 30
graceful_timeout = 30
keep_alive = 10
max_requests = 0
max_requests_jitter = 0
backlog = 16384
preload_app = true
dev_mode = false

[defaults.gateway]
disable_access_log = true
templates_auto_reload = false
structured_logging_database_enabled = false
sqlalchemy_echo = false
log_level = "ERROR"

[defaults.load]
driver = "contextforge_goose"
headless = true
only_summary = true
html_report = false
users = 300
spawn_rate = 60
run_time = "180s"
target_service = "nginx"

[defaults.load.env]
BENCH_MCP_SESSION_MODE = "reuse"

[defaults.load.workload]
fallback_endpoint = "/mcp prompts/get fast-time-schedule-meeting"

[defaults.load.workload.endpoints."/mcp prompts/get fast-time-schedule-meeting"]
enabled = true
weight = 12

[defaults.load.workload.endpoints."/mcp prompts/get fast-time-compare-timezones"]
enabled = true
weight = 8

[defaults.measurement]
warmup_seconds = 30
measure_seconds = 120
profile_seconds = 0
cooldown_seconds = 30

[defaults.profiling]
enabled = false
tools = ["perf", "flamegraph"]
duration_seconds = 0
required = false

[defaults.execution]
retry_enabled = true
max_attempts = 2
capture_logs = true
save_raw_results = true
reuse_stack = true

[[scenario]]
name = "gunicorn-secret-detection-baseline"
description = "Secret detection benchmark on the default benchmark image."
scenario_type = "secret_detection_baseline"

[scenario.build]
image_tag = "benchmark-suite-secret-detection-baseline"

[[scenario]]
name = "gunicorn-secret-detection-rust-plugins"
description = "Secret detection benchmark with Rust plugin artifacts installed."
scenario_type = "secret_detection_rust_plugins_compare"

[scenario.build]
rust_plugins = true
image_tag = "benchmark-suite-secret-detection-rust-plugins"
