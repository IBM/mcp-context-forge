---
# OCP Benchmark — trigger MCP benchmark
# Equivalent to: make ocp-benchmark OCP_NS=<namespace>
#
# Usage:
#   ansible-playbook ansible/ocp/playbooks/benchmark.yml -i ansible/ocp/inventory/cluster.yml
#   ansible-playbook ansible/ocp/playbooks/benchmark.yml -i ansible/ocp/inventory/cluster.yml -e bench_users=500 -e bench_spawn=50

- name: Run MCP benchmark on OCP
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../vars/defaults.yml

  tasks:
    - name: Display benchmark config
      ansible.builtin.debug:
        msg: |
          Starting MCP benchmark on OCP...
             Namespace: {{ ocp_namespace }}
             Config:    {{ bench_users }} users, {{ bench_spawn }}/s spawn, {{ bench_runtime }}

    - name: Find Locust master pod
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ ocp_namespace }}"
        label_selectors:
          - "app={{ ocp_namespace }}-mcp-stack-locust"
        field_selectors:
          - "status.phase=Running"
      register: locust_pods

    - name: Verify Locust is running
      ansible.builtin.assert:
        that:
          - locust_pods.resources | length > 0
        fail_msg: "Locust master pod not found. Run benchmark-setup first."

    - name: Trigger benchmark
      kubernetes.core.k8s_exec:
        namespace: "{{ ocp_namespace }}"
        pod: "{{ locust_pods.resources[0].metadata.name }}"
        container: locust
        command: >
          python3 -c "import urllib.request,urllib.parse;
          urllib.request.urlopen(urllib.request.Request('http://localhost:8089/swarm',
          urllib.parse.urlencode({'user_count':{{ bench_users }},'spawn_rate':{{ bench_spawn }},
          'run_time':'{{ bench_runtime }}',
          'host':'http://{{ ocp_namespace }}-mcp-stack-nginx'}).encode(), method='POST'))"
      register: benchmark_trigger

    - name: Benchmark started
      ansible.builtin.debug:
        msg: "Benchmark running. Results in ~60s."
