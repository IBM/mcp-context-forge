# Docker Compose for Vault Integration Testing
# Usage: docker-compose -f docker-compose.vault-test.yml up -d
# Note: Requires Colima running on macOS (see COLIMA_SETUP.md)

services:
  vault-test:
    image: hashicorp/vault:1.15
    container_name: contextforge-vault-test
    ports:
      - "8200:8200"
    environment:
      # Development mode - DO NOT USE IN PRODUCTION
      VAULT_DEV_ROOT_TOKEN_ID: test-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - vault-test-network

  # PostgreSQL for integration testing (optional - can use SQLite)
  postgres-test:
    image: postgres:15-alpine
    container_name: contextforge-postgres-test
    environment:
      POSTGRES_DB: mcp_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d mcp_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vault-test-network

networks:
  vault-test-network:
    driver: bridge
